#CI项目
name: TEST-NOTIFY

on:
  workflow_dispatch:
    inputs:
      WRT_CONFIG:
        description: '显示用配置名'
        required: false
        type: string
        default: 'MT6000-WIFI-FW3.txt'
      WRT_RELEASE_FIRMWARE:
        description: '模拟显示 Release 链接'
        required: false
        type: boolean
        default: true
      WHAT_MY_SAY:
        description: '附加说明'
        required: false
        type: string
        default: '这是一条钉钉通知测试消息'

permissions: read-all

jobs:
  notify:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.1

    - name: Create Test Notification Content
      id: notification_content
      env:
        TEST_START_TIME: ${{ github.run_id }}
        TEST_END_TIME: ${{ github.run_attempt }}
      run: |
        echo "【Lin】生成测试钉钉消息"
        workdir="$(mktemp -d)"
        config_file="$workdir/.config"
        readme_file="$workdir/readme.txt"
        readme_script="$GITHUB_WORKSPACE/Scripts/readme.sh"
        has_wifi="有WIFI"

        if printf '%s' "${{ inputs.WRT_CONFIG }}" | grep -Eq 'NOWIFI|WIFINO|NO-WIFI|WIFI-NO'; then
          has_wifi="无WIFI"
        fi

        printf '%s\n' \
          'CONFIG_PACKAGE_luci-app-accesscontrol=y' \
          'CONFIG_PACKAGE_luci-app-adguardhome=y' \
          'CONFIG_PACKAGE_luci-app-ddns=m' \
          > "$config_file"

        system_desc=$(printf '%s\n' \
          "编译开始：TEST_${TEST_START_TIME}" \
          "" \
          "### --- 编译说明 --- ###" \
          "支持设备：${{ inputs.WRT_CONFIG }}" \
          "固件类型：[测试通知]" \
          "支持平台：mediatek-filogic" \
          "FW环境：FW3" \
          "FRP角色：FRPC" \
          "设备架构：aarch64_cortex-a53" \
          "内核版本：6.12.80" \
          "LUCI版本：23.05" \
          "OP版本：24.10.5" \
          "包管理器：ipkg" \
          "默认地址：192.168.0.1" \
          "默认密码：无 | password" \
          "是否wifi：${has_wifi}" \
          "源码地址：https://github.com/coolsnowwolf/lede" \
          "源码分支：master" \
          "源码hash：test-notify")

        bash "$readme_script" -c "$config_file" -o "$readme_file" -s "$system_desc" -a "${{ inputs.WHAT_MY_SAY }}" -r false

        echo 'notify_content<<EOF' >> "$GITHUB_ENV"
        cat "$readme_file" >> "$GITHUB_ENV"
        echo 'EOF' >> "$GITHUB_ENV"

    - name: Send dingding notify
      env:
        DINGDING_MESSAGE: |
          ${{ env.notify_content }}
        DINGDING_TOKEN: ${{ secrets.DINGDING_TOKEN }}
      run: |
        if [ -z "${DINGDING_TOKEN}" ]; then
          echo "【Lin】未配置 DINGDING_TOKEN，跳过钉钉发送"
          exit 0
        fi
        payload=$(python3 -c 'import json, os; print(json.dumps({"msgtype":"text","text":{"content": os.environ["DINGDING_MESSAGE"]}}, ensure_ascii=False))')
        curl --fail --silent --show-error \
          -H 'Content-Type: application/json' \
          -d "$payload" \
          "https://oapi.dingtalk.com/robot/send?access_token=${DINGDING_TOKEN}"

    - name: Print Test Message
      run: |
        echo "${{ env.notify_content }}"
