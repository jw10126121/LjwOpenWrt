#CI项目
name: CUSTOM
run-name: CUSTOM-${{ inputs.WRT_RELEASE_FIRMWARE && 'release' || 'test' }}

#CI计划
on:
  workflow_dispatch:
    inputs:
      WHAT_MY_SAY:
        description: '编译说明'
        required: false
        type: string
        default: ''
      WRT_RELEASE_FIRMWARE:
        description: '是否发布'
        required: false
        type: boolean
        default: true

#CI权限
permissions: write-all

#CI任务
jobs:
  cmiot_ax18_nowifi_fw3:
    name: lean-CMIOT-AX18-NOWIFI-fw3-base
    uses: ./.github/workflows/DEFAULT.yml
    with:
      WRT_DEVICE: CMIOT-AX18-NOWIFI
      WRT_FIREWALL: fw3
      WRT_OVERLAYS: ''
      WRT_DIY_SETTING: diy_config.sh
      WRT_DIYPackages: Packages.sh
      WRT_DEFAULT_LANIP: 192.168.0.1
      WRT_RELEASE_FIRMWARE: ${{ inputs.WRT_RELEASE_FIRMWARE }}
      WHAT_MY_SAY: ${{ inputs.WHAT_MY_SAY }}
    secrets: inherit

  cmiot_ax18_nowifi_fw3_frps:
    name: lean-CMIOT-AX18-NOWIFI-fw3-frps
    uses: ./.github/workflows/DEFAULT.yml
    with:
      WRT_DEVICE: CMIOT-AX18-NOWIFI
      WRT_FIREWALL: fw3
      WRT_OVERLAYS: frps
      WRT_DIY_SETTING: diy_config.sh
      WRT_DIYPackages: Packages.sh
      WRT_DEFAULT_LANIP: 192.168.0.1
      WRT_RELEASE_FIRMWARE: ${{ inputs.WRT_RELEASE_FIRMWARE }}
      WHAT_MY_SAY: ${{ inputs.WHAT_MY_SAY }}
    secrets: inherit

  gl_mt6000_wifi_fw3:
    name: lean-GL-MT6000-WIFI-fw3-base
    uses: ./.github/workflows/DEFAULT.yml
    with:
      WRT_DEVICE: GL-MT6000-WIFI
      WRT_FIREWALL: fw3
      WRT_OVERLAYS: ''
      WRT_DIY_SETTING: diy_config.sh
      WRT_DIYPackages: Packages.sh
      WRT_DEFAULT_LANIP: 192.168.0.1
      WRT_RELEASE_FIRMWARE: ${{ inputs.WRT_RELEASE_FIRMWARE }}
      WHAT_MY_SAY: ${{ inputs.WHAT_MY_SAY }}
    secrets: inherit

  jd_ax6600_wifi_fw3:
    name: lean-JD-AX6600-WIFI-fw3-base
    uses: ./.github/workflows/DEFAULT.yml
    with:
      WRT_DEVICE: JD-AX6600-WIFI
      WRT_FIREWALL: fw3
      WRT_OVERLAYS: ''
      WRT_DIY_SETTING: diy_config.sh
      WRT_DIYPackages: Packages.sh
      WRT_DEFAULT_LANIP: 192.168.0.1
      WRT_RELEASE_FIRMWARE: ${{ inputs.WRT_RELEASE_FIRMWARE }}
      WHAT_MY_SAY: ${{ inputs.WHAT_MY_SAY }}
    secrets: inherit
