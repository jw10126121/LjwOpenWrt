#CI项目
name: DEFAULT

on:
  workflow_call:
    inputs:
      WRT_DEVICE:
        required: true
        type: string
      WRT_FIREWALL:
        required: true
        type: string
      WRT_OVERLAYS:
        required: false
        type: string
        default: ''
      WRT_LUCI_BRANCH:
        required: false
        type: string
        default: ''
      WRT_DIY_SETTING:
        required: false
        type: string
        default: 'diy_config.sh'
      WRT_DIYPackages:
        required: false
        type: string
        default: 'Packages.sh'
      WRT_DEFAULT_LANIP:
        required: false
        type: string
        default: '192.168.0.1'
      WRT_RELEASE_FIRMWARE:
        required: false
        type: boolean
        default: true
      WHAT_MY_SAY:
        required: false
        type: string
        default: ''
      WRT_SOURCE_FLAVOR:
        required: false
        type: string
        default: 'lean'
      WRT_SOURCE_HASH_INFO:
        required: false
        type: string
        default: ''
    secrets:
      DINGDING_TOKEN:
        required: false
  #手动编译
  workflow_dispatch:
    inputs:
      WRT_DEVICE:
        description: '设备型号'
        required: true
        type: choice
        options:
          - IPQ60XX-NOWIFI
          - IPQ60XX-NOWIFI-MINI
          - MT6000-WIFI
          - MT6000-WIFI-MINI
        default: 'IPQ60XX-NOWIFI-MINI'
      WRT_FIREWALL:
        description: '防火墙栈'
        required: true
        type: choice
        options:
          - fw3
          - fw4
        default: 'fw3'
      WRT_OVERLAYS:
        description: '可选 overlays，逗号分隔，例如 frps,apk'
        required: false
        type: string
        default: ''
      WRT_LUCI_BRANCH:
        description: '可选 LuCI feed 分支，例如 openwrt-23.05、23.05 或 2305；留空则使用源码默认值'
        required: false
        type: string
        default: ''
      WRT_DIY_SETTING:
        description: 'diy_setting脚本'
        required: false
        type: string
        default: 'diy_config.sh'
      WRT_DIYPackages:
        description: 'DIY包配置'
        required: false
        type: string
        default: 'Packages.sh'
      WRT_DEFAULT_LANIP:
        description: '默认LAN-IP'
        required: false
        type: string
        default: '192.168.0.1'
      WRT_RELEASE_FIRMWARE:
        description: '发布firmware'
        required: false
        type: boolean
        default: true
      WHAT_MY_SAY:
        description: '编译说明'
        required: false
        type: string
        default: ''
      WRT_SOURCE_FLAVOR:
        description: '源码风味'
        required: true
        type: choice
        options:
          - lean
          - VIKINGYFY
        default: 'lean'
      # WRT_REPO_INFO:
      #   description: '源码'
      #   required: true
      #   type: choice
      #   options:
      #     - 'https://github.com/coolsnowwolf/lede|master'
      #     - 'https://github.com/VIKINGYFY/immortalwrt|main'
      #   default: 'https://github.com/coolsnowwolf/lede|master'
      WRT_SOURCE_HASH_INFO:
        description: '源码HASH，推荐只填 commit hash；兼容旧格式 hash|url|branch'
        required: false
        type: string
        default: ''

#CI权限
permissions: write-all

#CI任务
jobs:
  config:
    name: ${{ inputs.WRT_SOURCE_FLAVOR }}-${{ inputs.WRT_DEVICE }}-${{ inputs.WRT_FIREWALL }}-${{ inputs.WRT_OVERLAYS != '' && inputs.WRT_OVERLAYS || 'base' }}
    strategy:
      fail-fast: false
      #max-parallel: 2
      matrix:
        TARGET: [IPQ60XX-NOWIFI]
        SOURCE: ['https://github.com/coolsnowwolf/lede']
        BRANCH: [master]

    #调用公用编译核心ALL-CORE.yml
    uses: ./.github/workflows/CORE-ALL.yml
    with:
      # 源码
      WRT_SOURCE_FLAVOR: ${{ inputs.WRT_SOURCE_FLAVOR }}
      WRT_SOURCE_HASH_INFO: ${{ inputs.WRT_SOURCE_HASH_INFO }}
      # 编译分支
      # WRT_REPO_BRANCH: ${{ 'master' }}
      # 编译指定版本
      # WRT_REPO_Commit_Hash: ${{ inputs.WRT_REPO_Commit_Hash }}
      # 参数化配置
      WRT_DEVICE: ${{ inputs.WRT_DEVICE }}
      WRT_FIREWALL: ${{ inputs.WRT_FIREWALL }}
      WRT_OVERLAYS: ${{ inputs.WRT_OVERLAYS }}
      WRT_LUCI_BRANCH: ${{ inputs.WRT_LUCI_BRANCH }}
      # DIY脚本
      WRT_DIY_SETTING: ${{ inputs.WRT_DIY_SETTING }}
      # DIY包配置
      WRT_DIYPackages: ${{ inputs.WRT_DIYPackages }}
      # FEED配置
      WRT_DIY_FEEDS: diy_feeds.sh
      # 是否发布
      WRT_RELEASE_FIRMWARE: ${{ inputs.WRT_RELEASE_FIRMWARE }} # 发布固件
      # 默认LAN-IP
      WRT_DEFAULT_LANIP: ${{ inputs.WRT_DEFAULT_LANIP }}
      # 钉钉TOKEN，用于推送下载文件
      WRT_TOKEN_DINGDING: ${{inputs.iTOKEN_DINGDING}}
      # 编译说明
      WRT_MINE_SAY: ${{ inputs.WHAT_MY_SAY }}
    secrets:
      # 钉钉TOKEN
      DINGDING_TOKEN: ${{ secrets.DINGDING_TOKEN }}
      
