name:  main

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      WRT_DEVICE:
        description: '设备型号'
        required: true
        type: string
        default: 'IPQ60XX-NOWIFI'
      WRT_FIREWALL:
        description: '防火墙栈，fw3 或 fw4'
        required: true
        type: string
        default: 'fw3'
      WRT_OVERLAYS:
        description: '可选 overlays，逗号分隔，例如 frps,apk'
        required: false
        type: string
        default: ''
      WRT_DIY_SETTING:
        description: 'DIY脚本'
        required: false
        type: string
        default: 'IPQ60XX.sh'
      WRT_DIYPackages:
        description: 'DIY包配置'
        required: false
        type: string
        default: 'Packages.sh'
      WRT_DEFAULT_LANIP:
        description: '配置LAN-IP'
        required: false
        type: string
        default: '192.168.0.1'
      WRT_SOURCE_FLAVOR:
        description: '源码风味'
        required: true
        type: choice
        options:
          - lean
          - VIKINGYFY
        default: 'lean'
      WRT_RELEASE_FIRMWARE:
        description: '发布firmware'
        required: false
        type: boolean
        default: true
      WRT_MINE_SAY:
        description: '编译说明'
        required: false
        type: string
        default: ''
      WRT_REPO_Commit_Hash:
        description: '历史版本HASH'
        required: false
        type: string
        default: ''
      # DINGDING_TOKEN:
      #   description: '钉钉TOKEN'
      #   required: false
      #   type: string
      #   default: ''
  # workflow_call:
  #   inputs:
  #     WRT_REPO_URL:
  #       required: true
  #       type: string
  #     WRT_REPO_BRANCH:
  #       required: true
  #       type: string
  #     WRT_REPO_Commit_Hash:
  #       required: true
