#CI项目
name: TEST-METADATA

on:
  workflow_dispatch:
    inputs:
      WRT_DEVICE:
        description: '显示用设备名'
        required: false
        type: string
        default: 'MT6000-WIFI'
      WRT_FIREWALL:
        description: '防火墙栈'
        required: false
        type: string
        default: 'fw3'
      WRT_DEFAULT_LANIP:
        description: '默认LAN-IP'
        required: false
        type: string
        default: '192.168.0.1'

permissions: read-all

jobs:
  metadata:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.1

    - name: Prepare Source Flavor Resolver
      run: |
        resolver_path="${RUNNER_TEMP}/source_flavor.sh"
        repo_resolver="$GITHUB_WORKSPACE/Scripts/lib/source_flavor.sh"

        if [ -f "$repo_resolver" ]; then
          cp "$repo_resolver" "$resolver_path"
        else
          cat > "${resolver_path}" <<'EOF_RESOLVER'
        #!/bin/bash

        resolve_source_selection() {
            local repo_hash="${1:-}"

            cat <<EOF_OUTPUT
        REPO_URL=https://github.com/coolsnowwolf/lede
        REPO_BRANCH=master
        REPO_HASH=${repo_hash}
        SOURCE_FLAVOR=lean
        EOF_OUTPUT
        }
        EOF_RESOLVER
        fi

        chmod +x "$resolver_path"
        echo "SOURCE_FLAVOR_RESOLVER=$resolver_path" >> "$GITHUB_ENV"

    - name: Build Test Fixture
      run: |
        tmp_root="$(mktemp -d)"
        openwrt_path="${tmp_root}/openwrt"
        mkdir -p "${openwrt_path}/target/linux/mediatek" \
                 "${openwrt_path}/include" \
                 "${openwrt_path}/config_mine"

        cat <<'EOF' | sed 's/^        //' > "${openwrt_path}/.config"
        CONFIG_TARGET_mediatek=y
        CONFIG_TARGET_mediatek_filogic=y
        CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_glinet_gl-mt6000=y
        CONFIG_TARGET_ARCH_PACKAGES="aarch64_cortex-a53"
        CONFIG_VERSION_NUMBER="OpenWrt 24.10.5"
        CONFIG_PACKAGE_firewall4=n
        CONFIG_PACKAGE_firewall=y
        CONFIG_PACKAGE_frpc=y
        CONFIG_PACKAGE_frps=m
        EOF

        cat <<'EOF' | sed 's/^        //' > "${openwrt_path}/feeds.conf.default"
        src-git packages https://github.com/openwrt/packages.git
        src-git luci https://github.com/openwrt/luci.git;openwrt-23.05
        EOF

        cat <<'EOF' | sed 's/^        //' > "${openwrt_path}/target/linux/mediatek/Makefile"
        KERNEL_PATCHVER:=6.12
        EOF

        cat <<'EOF' | sed 's/^        //' > "${openwrt_path}/include/kernel-6.12"
        LINUX_KERNEL_HASH-6.12.80 = test
        EOF

        cat <<'EOF' | sed 's/^        //' > "${openwrt_path}/include/version.mk"
        VERSION_NUMBER:= OpenWrt, 24.10.5
        EOF

        echo "TEST_OPENWRT_PATH=${openwrt_path}" >> "$GITHUB_ENV"

    - name: Run Source Metadata Script
      env:
        OPENWRT_PATH: ${{ env.TEST_OPENWRT_PATH }}
      run: |
        . "$SOURCE_FLAVOR_RESOLVER"
        selection="$(resolve_source_selection "")"
        eval "$selection"
        WRT_REPO_URL="$REPO_URL"
        WRT_REPO_BRANCH="$REPO_BRANCH"
        SOURCE_FLAVOR="$SOURCE_FLAVOR"
        export SOURCE_FLAVOR WRT_REPO_URL WRT_REPO_BRANCH
        bash "$GITHUB_WORKSPACE/Scripts/ci_collect_source_metadata.sh" | tee /tmp/source_metadata.txt
        grep -q '^WRT_VER=' /tmp/source_metadata.txt
        grep -q '^SOURCE_FLAVOR=' /tmp/source_metadata.txt
        grep -q '^DEVICE_TARGET=mediatek$' /tmp/source_metadata.txt
        grep -q '^DEVICE_SUBTARGET=filogic$' /tmp/source_metadata.txt

    - name: Run Final Metadata Script
      env:
        OPENWRT_PATH: ${{ env.TEST_OPENWRT_PATH }}
        WRT_DEFAULT_LANIP: ${{ inputs.WRT_DEFAULT_LANIP }}
        WRT_HAS_LITE: false
        WRT_HAS_WIFI: true
        WRT_USE_APK: false
        DEVICE_PROFILE: glinet_gl-mt6000
        DEVICE_TARGET: mediatek
        DEVICE_SUBTARGET: filogic
        VERSION_KERNEL: 6.12.80
        REPO_GIT_HASH: test-metadata
      run: |
        . "$SOURCE_FLAVOR_RESOLVER"
        selection="$(resolve_source_selection "")"
        eval "$selection"
        export WRT_REPO_URL="$REPO_URL" WRT_REPO_BRANCH="$REPO_BRANCH"
        bash "$GITHUB_WORKSPACE/Scripts/ci_collect_final_metadata.sh" | tee /tmp/final_metadata.txt
        grep -q '^DEVICE_ARCH=aarch64_cortex-a53$' /tmp/final_metadata.txt
        grep -q '^LUCI_VERSION=23.05$' /tmp/final_metadata.txt
        grep -q '^OP_VERSION=24.10.5$' /tmp/final_metadata.txt
        grep -q '^SOURCE_FLAVOR_TAG=lean$' /tmp/final_metadata.txt
        grep -q '^PACKAGE_MANAGER_TAG=ipk$' /tmp/final_metadata.txt
        grep -q '^FW_STACK_TAG=fw3$' /tmp/final_metadata.txt
        grep -q '^FRP_ROLE_TAG=frpc$' /tmp/final_metadata.txt
        grep -q '^BUILD_VARIANT_TAG=lean_fw3_frpc_ipk$' /tmp/final_metadata.txt
        grep -q '^system_content<<EOF_SYSTEM$' /tmp/final_metadata.txt
        grep -q '源码风味：lean' /tmp/final_metadata.txt
        grep -q 'FW环境：FW3' /tmp/final_metadata.txt
        grep -q 'FRP角色：FRPC' /tmp/final_metadata.txt

    - name: Print Summary
      run: |
        echo "Source metadata:"
        cat /tmp/source_metadata.txt
        echo ""
        echo "Final metadata:"
        cat /tmp/final_metadata.txt
